<div class="counter-section">
    <div class="container">
        <div class="counter-group">
            {% for item in module.animate_numbers %}
            <div class="counter-box">
                <div class="num count_down"><span>{{ item.number }}</span></div>
                <div class="title">
                    {{ item.title }}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
